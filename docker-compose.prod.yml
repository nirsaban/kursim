services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: kursim
      KURSIM_APP_PASSWORD: ${KURSIM_APP_PASSWORD:?set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: kursim-app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://kursim_app:${KURSIM_APP_PASSWORD}@postgres:5432/kursim
      MIGRATE_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/kursim
      REDIS_URL: redis://redis:6379
    # No published ports: reachable only by the reverse proxy on the shared network.
    networks: [internal, proxy]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # AI course-media worker: consumes the BullMQ queue and runs the Gemini
  # pipeline (prompt → Veo → ffmpeg frames → Imagen → Cloudinary). Shares the
  # app image; overrides the entrypoint to run the worker instead of the server.
  worker:
    build: .
    container_name: kursim-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://kursim_app:${KURSIM_APP_PASSWORD}@postgres:5432/kursim
      REDIS_URL: redis://redis:6379
      FFMPEG_PATH: /usr/bin/ffmpeg
    entrypoint: ["node", "--import", "tsx", "src/worker/course-media-worker.ts"]
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  internal:
  proxy:
    external: true
    name: miltech-association-net

volumes:
  pgdata:
  redisdata:
